<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>出退勤スキャナー (GitHub Pages)</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; transition: 0.3s; }
    #video-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; }
    #video { width: 100%; border: 5px solid #ccc; border-radius: 10px; background: #000; }
    #message { font-size: 20px; font-weight: bold; margin-top: 20px; min-height: 3em; }
    .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .mode-btn { padding: 15px 25px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; background: #ddd; }
    .active-in { background: #007bff !important; color: white; }
    .active-out { background: #dc3545 !important; color: white; }
    #start-btn { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .success { background-color: #d4edda !important; }
  </style>
</head>
<body>
  <h2>出退勤スキャナー</h2>
  
  <div class="btn-group">
    <button id="btn-in" class="mode-btn active-in" onclick="setMode('出勤')">出勤</button>
    <button id="btn-out" class="mode-btn" onclick="setMode('退勤')">退勤</button>
  </div>

  <div id="video-container">
    <video id="video" playsinline></video>
  </div>
  
  <div style="margin-top:20px;">
    <button id="start-btn" onclick="startCamera()">カメラを起動する</button>
  </div>
  
  <div id="message">モードを選んでカメラを起動してください</div>
  
  <audio id="sound-success" src="https://the-poker.com/sound/pipi.mp3" preload="auto"></audio>

  <script>
    // ★GASのWebアプリURLに差し替えてください★
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzqf4RW35Cp1xRpIVmrK6R80xpE_k8voUv2J4RJGEEy0x8yoRwHTNeG2XiQWcOoe_UV/exec";

    let currentMode = '出勤';
    let isProcessing = false;
    const video = document.getElementById('video');
    const message = document.getElementById('message');
    const soundSuccess = document.getElementById('sound-success');

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btn-in').classList.toggle('active-in', mode === '出勤');
      document.getElementById('btn-out').classList.toggle('active-out', mode === '退勤');
    }

    async function startCamera() {
      document.getElementById('start-btn').style.display = 'none';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        video.play();
        message.innerText = currentMode + "QRをスキャンしてください";
        requestAnimationFrame(tick);
      } catch (err) {
        message.innerHTML = "<span style='color:red;'>カメラエラー: " + err + "</span>";
      }
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing) {
        const canvas = document.createElement('canvas');
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code) {
          isProcessing = true;
          handleScan(code.data);
        }
      }
      requestAnimationFrame(tick);
    }

    async function handleScan(staffId) {
      message.innerText = "データ送信中...";
      try {
        // text/plainで送ることでCORSのプリフライトを回避
        const response = await fetch(GAS_URL, {
          method: "POST",
          mode: "cors", 
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ staffId: staffId, type: currentMode })
        });
        const res = await response.json();
        
        if (res.success) {
          try { soundSuccess.play(); } catch(e) {}
          document.body.classList.add('success');
          message.innerHTML = `ID:${res.staffId}<br>${res.status}完了<br>${res.time}`;
        } else {
          throw new Error(res.message);
        }
      } catch (err) {
        message.innerHTML = "<span style='color:red;'>送信失敗: " + err + "</span>";
      }

      setTimeout(() => {
        document.body.classList.remove('success');
        message.innerText = currentMode + "QRをスキャンしてください";
        isProcessing = false;
      }, 3000);
    }
  </script>
</body>
</html>
