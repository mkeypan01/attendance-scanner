<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>出退勤スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
    #menu-view, #scan-view { display: flex; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; }
    .btn-main { flex: 1; border: none; font-size: 40px; font-weight: bold; color: white; cursor: pointer; }
    #btn-in { background-color: #007bff; }
    #btn-out { background-color: #dc3545; }
    #scan-view { display: none; background: #000; }
    #video-container { flex: 1; position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #btn-back { height: 20%; background: #6c757d; border: none; color: white; font-size: 24px; font-weight: bold; }
    #overlay-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; text-align: center; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
    .success-flash { background-color: #28a745 !important; }
    .success-msg { color: white; font-size: 32px; font-weight: bold; }
  </style>
</head>
<body>

  <div id="menu-view">
    <button id="btn-in" class="btn-main" onclick="openScanner('出勤')">出 勤</button>
    <button id="btn-out" class="btn-main" onclick="openScanner('退勤')">退 勤</button>
  </div>

  <div id="scan-view">
    <div id="video-container">
      <video id="video" playsinline></video>
      <div id="overlay-msg">QRをスキャンしてください</div>
    </div>
    <button id="btn-back" onclick="closeScanner()">戻る</button>
  </div>

  <audio id="sound-success" src="https://soundeffect-lab.info/sound/button/mp3/decision35.mp3" preload="auto"></audio>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxRmc7RAjqFjD_jKDuHM7x5BhXX3wFrpdZgumcKIxNDlMjl_t4P5jpMnu0UfBwjG7OQ/exec";

    let currentMode = '';
    let isProcessing = false;
    let videoStream = null;
    const video = document.getElementById('video');
    const soundSuccess = document.getElementById('sound-success');

    async function openScanner(mode) {
      currentMode = mode;
      isProcessing = false;
      document.getElementById('menu-view').style.display = 'none';
      document.getElementById('scan-view').style.display = 'flex';
      document.getElementById('overlay-msg').innerText = mode + "スキャン中...";
      
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = videoStream;
        video.play();
        requestAnimationFrame(tick);
      } catch (err) {
        alert("カメラエラー: " + err);
        closeScanner();
      }
    }

    function closeScanner() {
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
      }
      document.getElementById('menu-view').style.display = 'flex';
      document.getElementById('scan-view').style.display = 'none';
      document.getElementById('scan-view').classList.remove('success-flash');
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing && document.getElementById('scan-view').style.display === 'flex') {
        const canvas = document.createElement('canvas');
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code) {
          isProcessing = true;
          handleScan(code.data);
          return;
        }
      }
      if (!isProcessing) requestAnimationFrame(tick);
    }

    async function handleScan(staffId) {
      document.getElementById('overlay-msg').innerText = "送信中...";
      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ staffId: staffId, type: currentMode })
        });
        const res = await response.json();
        
        if (res.success) {
          try { soundSuccess.play(); } catch(e) {}
          document.getElementById('scan-view').classList.add('success-flash');
          document.getElementById('overlay-msg').innerHTML = `<span class="success-msg">${res.status}完了<br>ID:${res.staffId}</span>`;
        }
      } catch (err) {
        alert("通信エラー: " + err);
      }

      setTimeout(() => {
        closeScanner();
      }, 2000);
    }
  </script>
</body>
</html>
