<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>出退勤スキャナー</title>
  
  <!-- PWA設定 -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4facfe">
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => {
          console.log('Service Worker registered.', reg);
        }).catch(err => {
          console.log('Service Worker registration failed.', err);
        });
      });
    }
  </script>
  
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root {
      --in-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --out-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --success-color: #28a745;
      --error-color: #dc3545;
      --idle-bg: #111; /* 擬似省電力背景 */
    }
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; background: #f0f2f5; }
    
    .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; }

    #menu-view { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; }

    .title-header { text-align: center; padding: 15px 0 5px; }
    .title-header h1 { margin: 0; font-size: 16px; color: #666; font-weight: bold; letter-spacing: 1px; }

    .button-container { 
      display: flex; 
      padding: 10px; 
      gap: 12px; 
      box-sizing: border-box;
    }
    .btn-main { 
      flex: 1; aspect-ratio: 1 / 1; border: none; border-radius: 24px; 
      font-size: 32px; font-weight: bold; color: white; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 8px 15px rgba(0,0,0,0.15); transition: transform 0.1s;
    }
    #btn-in { background: var(--in-gradient); }
    #btn-out { background: var(--out-gradient); }
    .btn-main:active { transform: scale(0.95); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-main small { font-size: 14px; margin-top: 8px; opacity: 0.9; font-weight: normal; }

    .announcement-container { 
      flex: 1; display: flex; flex-direction: column; margin: 10px; background: white; 
      border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; 
    }
    .header-label { padding: 12px 16px; background: #f8f9fa; font-size: 12px; font-weight: bold; color: #999; border-bottom: 1px solid #eee; }
    #announcement-text { flex: 1; padding: 20px; font-size: 18px; line-height: 1.6; color: #333; overflow-y: auto; white-space: pre-wrap; }

    /* オーバーレイ共通（カメラ・手入力） */
    .overlay-view { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: #000; z-index: 100; }
    #video-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    
    /* 手入力用 */
    #manual-view { background: #f0f2f5; justify-content: center; align-items: center; }
    .manual-card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 85%; max-width: 320px; text-align: center; }
    #input-id { width: 100%; font-size: 44px; text-align: center; padding: 12px; border: 2px solid #eee; border-radius: 16px; margin: 20px 0; background: #f9f9f9; }
    .btn-ok { width: 100%; padding: 16px; font-size: 22px; font-weight: bold; color: white; background: #28a745; border: none; border-radius: 16px; cursor: pointer; }

    .btn-cancel { height: 85px; background: #444; border: none; color: white; font-size: 20px; font-weight: bold; cursor: pointer; }
    #overlay-msg { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: white; font-size: 18px; text-align: center; background: rgba(0,0,0,0.75); padding: 12px 30px; border-radius: 50px; width: 80%; pointer-events: none; }
    /* エラーメッセージ用 */
    .error-message { color: var(--error-color); font-size: 16px; font-weight: bold; margin-top: 10px; }

    body.success-flash { background-color: var(--success-color) !important; }
    .success-msg { color: #fff; font-size: 28px; font-weight: bold; }
    
    /* 擬似省電力用オーバーレイ */
    #blackout-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: black; z-index: 9999; cursor: pointer; opacity: 0; 
      transition: opacity 0.2s ease-in-out;
    }
    #blackout-overlay.visible { opacity: 1; } /* 表示時 */
  </style>
</head>
<body onmousedown="resetIdleTimer()" ontouchstart="resetIdleTimer()">

  <!-- 擬似省電力レイヤー -->
  <div id="blackout-overlay"></div>

  <div class="app-container">
    <div id="menu-view">
      <div class="title-header"><h1>出退勤記録用スキャナー</h1></div>
      <div class="button-container">
        <button id="btn-in" class="btn-main" onclick="openScanner('出勤')">出勤<br><small>Clock In</small></button>
        <button id="btn-out" class="btn-main" onclick="openScanner('退勤')">退勤<br><small>Clock Out</small></button>
      </div>
      <div class="announcement-container">
        <div class="header-label">📢 連絡事項</div>
        <div id="announcement-text">読み込み中...</div>
      </div>
    </div>

    <!-- カメラ画面 -->
    <div id="scan-view" class="overlay-view">
      <div id="video-container">
        <video id="video" playsinline></video>
        <div id="overlay-msg">QRコードをスキャン</div>
      </div>
      <button class="btn-cancel" onclick="closeScanner()">キャンセル</button>
    </div>

    <!-- 手入力画面 -->
    <div id="manual-view" class="overlay-view">
      <div class="manual-card">
        <h3 style="margin:0; color:#666;">IDを手入力</h3>
        <input type="tel" id="input-id" maxlength="4" placeholder="0000" onkeyup="if(event.key==='Enter') submitManual()">
        <button class="btn-ok" onclick="submitManual()">打刻する</button>
      </div>
      <div style="height: 30px;"></div>
      <button class="btn-cancel" onclick="closeScanner()">キャンセルして戻る</button>
    </div>
  </div>

  <audio id="sound-success" src="あなたの音声URL" preload="auto"></audio>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyszvve8Ld4nyVbSyDJn3YmlgZU6Ki2GLBwAk1REgU3RaRm1oEGoOBhdW2N9uFGS7a-/exec"; // ★ ★ ★ ここにGASのURLを入れてください ★ ★ ★
    const IDLE_TIME = 180000; // 3分 (ミリ秒)

    let currentMode = '', isProcessing = false, videoStream = null, scanTimer = null, wakeLock = null;
    let idleTimer = null;
    let deviceMotionEnabled = false; // devicemotionイベントの有効フラグ

    const video = document.getElementById('video'), overlayMsg = document.getElementById('overlay-msg');
    const announceArea = document.getElementById('announcement-text'), inputId = document.getElementById('input-id'), soundSuccess = document.getElementById('sound-success');
    const blackout = document.getElementById('blackout-overlay');

    // 1. お知らせ取得
    async function loadAnnouncement() {
      try {
        const response = await fetch(GAS_URL, {
          method: "POST", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "getAnnouncement" })
        });
        const res = await response.json();
        if (res.success) announceArea.innerText = res.message;
      } catch (err) { announceArea.innerText = "エラー：連絡事項を取得できません。"; }
    }

    // 2. スリープ防止 (Wake Lock)
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); console.log('WakeLock acquired'); } 
        catch (err) { console.error('WakeLock error:', err); }
      }
    }

    // 3. 擬似省電力タイマー管理
    function resetIdleTimer() {
      blackout.style.display = 'none'; // 黒画面を隠す
      clearTimeout(idleTimer);
      if (document.getElementById('menu-view').style.display !== 'none') {
        idleTimer = setTimeout(showBlackout, IDLE_TIME);
      }
    }
    function showBlackout() {
      blackout.style.display = 'block';
      // blackoutが表示されたら、さらにタッチイベントなどで復帰できるようにする
      blackout.style.opacity = '1';
    }

    // 4. 傾き検知での復帰
    window.addEventListener('devicemotion', handleMotion, { passive: true }); // passive:true でパフォーマンス向上

    function handleMotion(event) {
      // blackoutが表示されている時のみ、動きを検知して復帰させる
      if (blackout.style.display === 'block') {
        const acc = event.accelerationIncludingGravity;
        if (!acc) return;
        const totalAcc = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
        if (totalAcc > 15) { // 感度は必要に応じて調整
          resetIdleTimer();
        }
      }
    }

    // 5. 初期化
    window.onload = () => {
      loadAnnouncement();
      resetIdleTimer();
      requestWakeLock(); // 起動時にWakeLockを試みる
    };

    function unlockAudio() {
      if (soundSuccess) {
        soundSuccess.play().then(() => {
          soundSuccess.pause(); soundSuccess.currentTime = 0;
        }).catch(() => {});
      }
    }

    async function openScanner(mode) {
      currentMode = mode; isProcessing = false;
      clearTimeout(idleTimer); // スキャン中は省電力タイマーを停止
      document.body.classList.remove('success-flash');
      unlockAudio(); 
      await requestWakeLock(); // ボタン押下時に確実にWakeLockを確保
      
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('scan-view').style.display = 'flex';
        overlayMsg.innerText = mode + "QRをスキャン中...";
        video.srcObject = videoStream; 
        video.play(); 
        requestAnimationFrame(tick);
        
        scanTimer = setTimeout(() => { alert("タイムアウトしました。"); closeScanner(); }, 30000);
      } catch (err) {
        console.warn("Camera access failed:", err);
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('manual-view').style.display = 'flex';
        inputId.value = ""; inputId.focus();
      }
    }

    function closeScanner() {
      if (scanTimer) clearTimeout(scanTimer);
      if (wakeLock) { wakeLock.release().then(() => { wakeLock = null; }); }
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
      document.getElementById('menu-view').style.display = 'flex';
      document.getElementById('scan-view').style.display = 'none';
      document.getElementById('manual-view').style.display = 'none';
      document.body.classList.remove('success-flash');
      loadAnnouncement();
      resetIdleTimer(); // メニューに戻ったらタイマー再開
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing && document.getElementById('scan-view').style.display === 'flex') {
        const canvas = document.createElement('canvas');
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code && /^\d{4}$/.test(code.data)) {
          isProcessing = true;
          if (scanTimer) clearTimeout(scanTimer);
          handleScan(code.data);
          return;
        }
      }
      if (!isProcessing && document.getElementById('scan-view').style.display === 'flex') requestAnimationFrame(tick);
    }

    function submitManual() {
      const val = inputId.value.trim(); // 余分な空白を削除
      if (/^\d{4}$/.test(val)) { 
        isProcessing = true; 
        handleScan(val); 
      } else { 
        alert("4桁の数字を入力してください。"); 
      }
    }

    async function handleScan(staffId) {
      const isManual = document.getElementById('manual-view').style.display === 'flex';
      let displayElement = isManual ? document.querySelector('#manual-view .manual-card') : overlayMsg;
      let successMessage = `<span class="success-msg">${currentMode}完了<br>ID:${staffId}</span>`;
      let errorMessage = `<div class="error-message">送信エラー</div>`; // エラー表示用

      if (!isManual) {
        overlayMsg.innerText = "送信中...";
      } else {
        // 手入力モードの場合、カード内容を一時的に変える
        document.querySelector('#manual-view .manual-card h3').style.display = 'none';
        document.querySelector('#manual-view .manual-card input').style.display = 'none';
        document.querySelector('#manual-view .manual-card button').style.display = 'none';
        displayElement.innerHTML = "送信中..."; // カード内に送信中メッセージを表示
      }

      try {
        const response = await fetch(GAS_URL, {
          method: "POST", mode: "cors", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ staffId: staffId, type: currentMode })
        });
        const res = await response.json();
        
        if (res.success) {
          if (soundSuccess) soundSuccess.play().catch(() => {});
          document.body.classList.add('success-flash');
          displayElement.innerHTML = successMessage;
          setTimeout(() => {
            if (isManual) location.reload(); else closeScanner();
          }, 2000);
        } else {
          // GASからのエラーレスポンス
          if (!isManual) {
            overlayMsg.innerHTML = errorMessage + `<div class="error-message">${res.message || '不明なエラー'}</div>`;
          } else {
            document.querySelector('#manual-view .manual-card').innerHTML = `${errorMessage}<div class="error-message">${res.message || '不明なエラー'}</div><button class="btn-ok" onclick="location.reload()">OK</button>`; // エラー時はOKボタンを再度表示
          }
          isProcessing = false; // エラー時は再スキャン可能にする
        }
      } catch (err) {
        // fetch自体のエラー（ネットワークエラーなど）
        console.error("Fetch error:", err);
        if (!isManual) {
          overlayMsg.innerHTML = errorMessage + `<div class="error-message">通信エラー</div>`;
        } else {
          document.querySelector('#manual-view .manual-card').innerHTML = `${errorMessage}<div class="error-message">通信エラー</div><button class="btn-ok" onclick="location.reload()">OK</button>`;
        }
        isProcessing = false; // エラー時は再スキャン可能にする
      }
    }
  </script>
</body>
</html>
