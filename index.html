<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>出退勤スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root {
      --bg-color: #f0f2f5;
      --in-color: #4facfe;
      --out-color: #f093fb;
      --back-color: #6c757d;
      --success-color: #28a745;
    }
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background-color: var(--bg-color); display: flex; align-items: center; justify-content: center; overflow: hidden; transition: background-color 0.4s; }
    
    .app-container { width: 100%; height: 100%; background: white; display: flex; flex-direction: column; }

    /* メニュー画面 */
    #menu-view { flex: 1; display: flex; flex-direction: column; }
    
    /* 上半分：ボタンエリア */
    .top-half { height: 50%; display: flex; flex-direction: column; border-bottom: 2px dashed #ccc; }
    .header { text-align: center; padding: 10px 0; background: #fff; }
    .header h2 { margin: 5px 0; font-size: 20px; color: #555; }
    .btn-group { flex: 1; display: flex; padding: 10px; gap: 10px; }
    .btn-main { flex: 1; border: none; border-radius: 12px; font-size: 32px; font-weight: bold; color: white; cursor: pointer; }
    #btn-in { background: linear-gradient(135deg, #4facfe, #00f2fe); }
    #btn-out { background: linear-gradient(135deg, #f093fb, #f5576c); }

    /* 下半分：メッセージエリア */
    .bottom-half { height: 50%; padding: 20px; box-sizing: border-box; background: #fafafa; display: flex; flex-direction: column; }
    .msg-label { font-size: 14px; color: #888; margin-bottom: 10px; font-weight: bold; }
    #announcement-text { flex: 1; font-size: 20px; color: #333; line-height: 1.6; white-space: pre-wrap; overflow-y: auto; }

    /* スキャン画面 */
    #scan-view { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: #000; }
    #video-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #btn-back { height: 80px; background: var(--back-color); border: none; color: white; font-size: 22px; font-weight: bold; }
    #overlay-msg { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: white; font-size: 18px; text-align: center; background: rgba(0,0,0,0.6); padding: 12px 24px; border-radius: 50px; width: 85%; pointer-events: none; }

    body.success-flash { background-color: var(--success-color); }
    .success-msg { color: #fff; font-size: 28px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="menu-view">
      <!-- 上半分：操作系 -->
      <div class="top-half">
        <div class="header"><h2>出退勤スキャナー</h2></div>
        <div class="btn-group">
          <button id="btn-in" class="btn-main" onclick="openScanner('出勤')">出勤</button>
          <button id="btn-out" class="btn-main" onclick="openScanner('退勤')">退勤</button>
        </div>
      </div>
      <!-- 下半分：お知らせ -->
      <div class="bottom-half">
        <div class="msg-label">【 連絡事項 】</div>
        <div id="announcement-text">お知らせを読み込み中...</div>
      </div>
    </div>

    <!-- スキャン画面 -->
    <div id="scan-view">
      <div id="video-container">
        <video id="video" playsinline></video>
        <div id="overlay-msg">QRコードをスキャン</div>
      </div>
      <button id="btn-back" onclick="closeScanner()">キャンセル</button>
    </div>
  </div>

  <audio id="sound-success" src="https://www.springin.org/wp-content/uploads/2022/06/%E6%B1%BA%E5%AE%9A1.mp3" preload="auto"></audio>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyaTtACK4QBplXCr2h2eOo6-ShyBTGq0-xPhtCs411R3j40-Ee5HAPRpIwVZ7b1Tgjq/exec";

    let currentMode = '';
    let isProcessing = false;
    let videoStream = null;
    let scanTimer = null;
    let wakeLock = null;

    const video = document.getElementById('video');
    const overlayMsg = document.getElementById('overlay-msg');
    const soundSuccess = document.getElementById('sound-success');
    const announceArea = document.getElementById('announcement-text');

    // お知らせを取得する
    async function loadAnnouncement() {
      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "getAnnouncement" })
        });
        const res = await response.json();
        if (res.success) announceArea.innerText = res.message;
      } catch (err) {
        announceArea.innerText = "お知らせの取得に失敗しました。";
      }
    }

    // 起動時にお知らせを読み込む
    window.onload = loadAnnouncement;

    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
      }
    }

    function unlockAudio() {
      if (soundSuccess) {
        soundSuccess.play().then(() => { soundSuccess.pause(); soundSuccess.currentTime = 0; }).catch(e => {});
      }
    }

    async function openScanner(mode) {
      currentMode = mode;
      isProcessing = false;
      overlayMsg.innerText = mode + "QRをスキャン中...";
      document.body.classList.remove('success-flash');
      unlockAudio();
      requestWakeLock();

      document.getElementById('menu-view').style.opacity = '0'; // 瞬間的に消す
      setTimeout(() => {
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('scan-view').style.display = 'flex';
      }, 50);
      
      scanTimer = setTimeout(() => { alert("30秒経過しましたので戻ります。"); closeScanner(); }, 30000);

      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = videoStream;
        video.play();
        requestAnimationFrame(tick);
      } catch (err) {
        alert("カメラエラー: " + err);
        closeScanner();
      }
    }

    function closeScanner() {
      if (scanTimer) clearTimeout(scanTimer);
      if (wakeLock) { wakeLock.release().then(() => { wakeLock = null; }); }
      if (videoStream) { videoStream.getTracks().forEach(track => track.stop()); videoStream = null; }
      document.getElementById('menu-view').style.display = 'flex';
      document.getElementById('menu-view').style.opacity = '1';
      document.getElementById('scan-view').style.display = 'none';
      document.body.classList.remove('success-flash');
      loadAnnouncement(); // 戻ったときにお知らせを再更新
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing && document.getElementById('scan-view').style.display === 'flex') {
        const canvas = document.createElement('canvas');
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code && /^\d{4}$/.test(code.data)) {
          isProcessing = true;
          if (scanTimer) clearTimeout(scanTimer);
          handleScan(code.data);
          return;
        }
      }
      if (!isProcessing && document.getElementById('scan-view').style.display === 'flex') requestAnimationFrame(tick);
    }

    async function handleScan(staffId) {
      overlayMsg.innerText = "送信中...";
      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ staffId: staffId, type: currentMode })
        });
        const res = await response.json();
        if (res.success) {
          if (soundSuccess) soundSuccess.play().catch(e => {});
          document.body.classList.add('success-flash');
          overlayMsg.innerHTML = `<span class="success-msg">${res.status}完了<br>ID:${res.staffId}</span>`;
          setTimeout(() => { closeScanner(); }, 2000);
        }
      } catch (err) {
        alert("通信失敗: " + err);
        isProcessing = false;
        overlayMsg.innerText = currentMode + "QRをスキャン中...";
      }
    }
  </script>
</body>
</html>
