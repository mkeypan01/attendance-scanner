<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>出退勤スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root {
      --in-color: #4facfe;
      --out-color: #f093fb;
      --success-color: #28a745;
    }
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; background: #fff; }
    
    .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; }

    #menu-view { flex: 1; display: flex; flex-direction: column; }

    /* 上部エリア：ボタンを横に2つ並べる（正方形） */
    .button-row { display: flex; width: 100%; }
    .btn-main { 
      width: 50%; aspect-ratio: 1 / 1; border: none; 
      font-size: 32px; font-weight: bold; color: white; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #btn-in { background: linear-gradient(135deg, #4facfe, #00f2fe); border-right: 1px solid rgba(255,255,255,0.3); }
    #btn-out { background: linear-gradient(135deg, #f093fb, #f5576c); }
    .btn-main small { font-size: 14px; margin-top: 5px; opacity: 0.8; }

    /* 下部エリア：連絡事項 */
    .announcement-container { flex: 1; display: flex; flex-direction: column; background: #fafafa; overflow: hidden; }
    .header-label { padding: 10px; background: #eee; font-size: 13px; font-weight: bold; color: #666; border-bottom: 1px solid #ddd; }
    #announcement-text { flex: 1; padding: 15px; font-size: 20px; line-height: 1.6; color: #333; overflow-y: auto; white-space: pre-wrap; }

    /* スキャン画面 */
    #scan-view { display: none; flex-direction: column; height: 100%; width: 100%; position: absolute; top: 0; left: 0; background: #000; z-index: 100; }
    #video-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #btn-back { height: 80px; background: #666; border: none; color: white; font-size: 20px; font-weight: bold; }
    #overlay-msg { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: white; font-size: 18px; text-align: center; background: rgba(0,0,0,0.6); padding: 12px 24px; border-radius: 50px; width: 80%; pointer-events: none; }

    body.success-flash { background-color: var(--success-color) !important; }
    .success-msg { color: #fff; font-size: 28px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="menu-view">
      <div class="button-row">
        <button id="btn-in" class="btn-main" onclick="openScanner('出勤')">出勤<br><small>Clock In</small></button>
        <button id="btn-out" class="btn-main" onclick="openScanner('退勤')">退勤<br><small>Clock Out</small></button>
      </div>
      <div class="announcement-container">
        <div class="header-label">📢 連絡事項</div>
        <div id="announcement-text">読み込み中...</div>
      </div>
    </div>

    <div id="scan-view">
      <div id="video-container">
        <video id="video" playsinline></video>
        <div id="overlay-msg">QRコードをスキャン</div>
      </div>
      <button id="btn-back" onclick="closeScanner()">キャンセル</button>
    </div>
  </div>

  <audio id="sound-success" src="" preload="auto"></audio>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyqk8zDqi17WXOfzz1XLbjRYerRfQyxlZcGnySkKRQm5shpKZRAjkWZ6ov4ft3w9Q8/exec";
    let currentMode = '', isProcessing = false, videoStream = null, scanTimer = null, wakeLock = null;
    const video = document.getElementById('video'), overlayMsg = document.getElementById('overlay-msg');
    const soundSuccess = document.getElementById('sound-success'), announceArea = document.getElementById('announcement-text');

    async function loadAnnouncement() {
      try {
        const response = await fetch(GAS_URL, {
          method: "POST", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ action: "getAnnouncement" })
        });
        const res = await response.json();
        if (res.success) announceArea.innerText = res.message;
      } catch (err) { announceArea.innerText = "エラー：連絡事項を取得できません。"; }
    }
    window.onload = loadAnnouncement;

    function unlockAudio() { if (soundSuccess) { soundSuccess.play().then(() => { soundSuccess.pause(); soundSuccess.currentTime = 0; }).catch(() => {}); } }
    async function requestWakeLock() { if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {} } }

    async function openScanner(mode) {
      currentMode = mode; isProcessing = false;
      overlayMsg.innerText = mode + "QRをスキャン中...";
      document.body.classList.remove('success-flash');
      unlockAudio(); requestWakeLock();
      document.getElementById('menu-view').style.display = 'none';
      document.getElementById('scan-view').style.display = 'flex';
      scanTimer = setTimeout(() => { alert("30秒経過しました。"); closeScanner(); }, 30000);
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = videoStream; video.play(); requestAnimationFrame(tick);
      } catch (err) { alert("カメラエラー"); closeScanner(); }
    }

    function closeScanner() {
      if (scanTimer) clearTimeout(scanTimer);
      if (wakeLock) wakeLock.release().then(() => wakeLock = null);
      if (videoStream) videoStream.getTracks().forEach(track => track.stop());
      document.getElementById('menu-view').style.display = 'flex';
      document.getElementById('scan-view').style.display = 'none';
      document.body.classList.remove('success-flash');
      loadAnnouncement();
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing && document.getElementById('scan-view').style.display === 'flex') {
        const canvas = document.createElement('canvas');
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        if (code && /^\d{4}$/.test(code.data)) {
          isProcessing = true;
          if (scanTimer) clearTimeout(scanTimer);
          handleScan(code.data);
          return;
        }
      }
      if (!isProcessing && document.getElementById('scan-view').style.display === 'flex') requestAnimationFrame(tick);
    }

    async function handleScan(staffId) {
      overlayMsg.innerText = "送信中...";
      try {
        const res = await fetch(GAS_URL, {
          method: "POST", mode: "cors", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ staffId: staffId, type: currentMode })
        }).then(r => r.json());
        if (res.success) {
          if (soundSuccess) soundSuccess.play().catch(() => {});
          document.body.classList.add('success-flash');
          overlayMsg.innerHTML = `<span class="success-msg">${res.status}完了<br>ID:${res.staffId}</span>`;
          setTimeout(closeScanner, 2000);
        }
      } catch (err) { alert("通信失敗"); isProcessing = false; }
    }
  </script>
</body>
</html>
