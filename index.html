<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>出退勤スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    /* CSSはGAS版と共通 */
    :root {
      --bg-color: #f0f2f5;
      --in-color: #4facfe;
      --in-hover: #00f2fe;
      --out-color: #f093fb;
      --out-hover: #f5576c;
      --back-color: #6c757d;
      --success-color: #28a745;
    }
    body, html { 
      margin: 0; padding: 0; height: 100%; 
      font-family: 'Helvetica Neue', Arial, sans-serif; 
      background-color: var(--bg-color);
      transition: background-color 0.4s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .app-container {
      width: 95%; max-width: 500px; height: 90%;
      background: white; border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }
    #menu-view { flex: 1; display: flex; flex-direction: column; padding: 30px 20px; gap: 20px; justify-content: center; }
    .header { text-align: center; margin-bottom: 20px; color: #333; }
    .header h2 { margin: 0; font-size: 26px; }
    .btn-main { 
      width: 100%; height: 160px; border: none; border-radius: 20px;
      font-size: 40px; font-weight: bold; color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s;
      box-sizing: border-box;
    }
    #btn-in { background: linear-gradient(135deg, var(--in-color), var(--in-hover)); }
    #btn-out { background: linear-gradient(135deg, var(--out-color), var(--out-hover)); }
    #scan-view { display: none; flex-direction: column; height: 100%; width: 100%; }
    #video-container { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #btn-back { height: 90px; background: var(--back-color); border: none; color: white; font-size: 22px; font-weight: bold; cursor: pointer; }
    #overlay-msg { 
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: white; font-size: 18px; text-align: center; 
      background: rgba(0,0,0,0.6); padding: 12px 24px; border-radius: 50px; width: 85%;
    }
    body.success-flash { background-color: var(--success-color); }
    .success-msg { color: #fff; font-size: 30px; font-weight: bold; line-height: 1.4; }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="menu-view">
      <div class="header"><h2>出退勤システム</h2></div>
      <button id="btn-in" class="btn-main" onclick="openScanner('出勤')">出 勤</button>
      <button id="btn-out" class="btn-main" onclick="openScanner('退勤')">退 勤</button>
    </div>

    <div id="scan-view">
      <div id="video-container">
        <video id="video" playsinline></video>
        <div id="overlay-msg">QRコードをスキャン</div>
      </div>
      <button id="btn-back" onclick="closeScanner()">キャンセル</button>
    </div>
  </div>

  <audio id="sound-success" src="https://www.springin.org/wp-content/uploads/2022/06/%E6%B1%BA%E5%AE%9A1.mp3" preload="auto"></audio>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxRmc7RAjqFjD_jKDuHM7x5BhXX3wFrpdZgumcKIxNDlMjl_t4P5jpMnu0UfBwjG7OQ/exec";

    let currentMode = '';
    let isProcessing = false;
    let videoStream = null;
    let scanTimer = null;
    let wakeLock = null; // ★スリープ防止用

    const video = document.getElementById('video');
    const overlayMsg = document.getElementById('overlay-msg');
    const soundSuccess = document.getElementById('sound-success');

    // ★スリープ防止をリクエストする関数
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          console.log('Wake Lock is active');
        } catch (err) {
          console.error(`${err.name}, ${err.message}`);
        }
      }
    }

    // ★音を「アンロック」する関数
    function unlockAudio() {
      soundSuccess.play().then(() => {
        soundSuccess.pause();
        soundSuccess.currentTime = 0;
      }).catch(e => console.log("Audio unlock failed:", e));
    }
    
    async function openScanner(mode) {
      currentMode = mode;
      isProcessing = false;
      
      // ★1. ユーザー操作のタイミングでスリープ防止を起動
      requestWakeLock();
      
      // ★2. ユーザー操作のタイミングで音をアンロック
      unlockAudio();

      overlayMsg.innerText = mode + "QRをスキャン中...";
      document.body.classList.remove('success-flash');
      
      document.getElementById('menu-view').style.display = 'none';
      document.getElementById('scan-view').style.display = 'flex';
      
      scanTimer = setTimeout(() => {
        alert("30秒経過しましたので、選択画面に戻ります。");
        closeScanner();
      }, 30000);

      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = videoStream;
        video.play();
        requestAnimationFrame(tick);
      } catch (err) {
        alert("カメラを起動できませんでした。");
        closeScanner();
      }
    }
    
    function closeScanner() {
      if (scanTimer) clearTimeout(scanTimer);
      
      // ★スリープ防止を解除
      if (wakeLock !== null) {
        wakeLock.release().then(() => { wakeLock = null; });
      }

      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
      }
      document.getElementById('menu-view').style.display = 'flex';
      document.getElementById('scan-view').style.display = 'none';
      document.body.classList.remove('success-flash');
      overlayMsg.innerText = "QRコードをスキャン";
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing && document.getElementById('scan-view').style.display === 'flex') {
        const canvas = document.createElement('canvas');
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        
        if (code && /^\d{4}$/.test(code.data)) {
          isProcessing = true;
          if (scanTimer) clearTimeout(scanTimer);
          handleScan(code.data);
          return;
        }
      }
      if (!isProcessing) requestAnimationFrame(tick);
    }

    async function handleScan(staffId) {
      overlayMsg.innerText = "送信中...";
      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ staffId: staffId, type: currentMode })
        });
        const res = await response.json();
        if (res.success) {
          try { soundSuccess.play(); } catch(e) {}
          document.body.classList.add('success-flash');
          overlayMsg.innerHTML = `<span class="success-msg">${res.status}完了<br>ID:${res.staffId}</span>`;
          setTimeout(() => {
            closeScanner();
          }, 2000);
        }
      } catch (err) {
        alert("通信失敗: " + err);
        isProcessing = false;
        overlayMsg.innerText = currentMode + "QR
