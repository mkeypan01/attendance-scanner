<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>出退勤スキャナー</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    :root {
      --bg-color: #f0f2f5;
      --in-color: #4facfe;
      --in-hover: #00f2fe;
      --out-color: #f093fb;
      --out-hover: #f5576c;
      --back-color: #6c757d;
      --success-color: #28a745;
    }
    body, html { 
      margin: 0; padding: 0; height: 100%; 
      font-family: 'Helvetica Neue', Arial, sans-serif; 
      background-color: var(--bg-color);
      transition: background-color 0.4s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .app-container {
      width: 95%; max-width: 500px; height: 90%;
      background: white; border-radius: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }
    /* メニュー画面：ボタンを中央に寄せ、横長にする */
    #menu-view { 
      flex: 1; display: flex; flex-direction: column; 
      padding: 30px 20px; gap: 20px; justify-content: center; 
    }
    .header { text-align: center; margin-bottom: 10px; color: #333; }
    .header h2 { margin: 0; font-size: 24px; }

    /* ボタンのデザイン：横長に変更 */
    .btn-main { 
      width: 100%; height: 140px; border: none; border-radius: 20px;
      font-size: 40px; font-weight: bold; color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s;
    }
    #btn-in { background: linear-gradient(135deg, var(--in-color), var(--in-hover)); }
    #btn-out { background: linear-gradient(135deg, var(--out-color), var(--out-hover)); }
    .btn-main:active { transform: scale(0.97); }

    /* スキャン画面 */
    #scan-view { display: none; flex-direction: column; height: 100%; width: 100%; }
    #video-container { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #btn-back { height: 90px; background: var(--back-color); border: none; color: white; font-size: 22px; font-weight: bold; cursor: pointer; }
    
    #overlay-msg { 
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: white; font-size: 18px; text-align: center; 
      background: rgba(0,0,0,0.6); padding: 12px 24px; border-radius: 50px; width: 85%; pointer-events: none;
    }
    body.success-flash { background-color: var(--success-color); }
    .success-msg { color: #fff; font-size: 28px; font-weight: bold; line-height: 1.4; }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="menu-view">
      <div class="header"><h2>出退勤スキャナー</h2></div>
      <button id="btn-in" class="btn-main" onclick="openScanner('出勤')">出 勤</button>
      <button id="btn-out" class="btn-main" onclick="openScanner('退勤')">退 勤</button>
    </div>

    <div id="scan-view">
      <div id="video-container">
        <video id="video" playsinline></video>
        <div id="overlay-msg">QRコードをスキャン</div>
      </div>
      <button id="btn-back" onclick="closeScanner()">キャンセル</button>
    </div>
  </div>

  <!-- ★mp3のURLをsrcに入れてください★ -->
  <audio id="sound-success" src="" preload="auto"></audio>

  <script>
    // ★GASのURLをここに入れてください★
    const GAS_URL = "";

    let currentMode = '';
    let isProcessing = false;
    let videoStream = null;
    let scanTimer = null; // 30秒タイマー
    let wakeLock = null;  // スリープ防止

    const video = document.getElementById('video');
    const overlayMsg = document.getElementById('overlay-msg');
    const soundSuccess = document.getElementById('sound-success');

    // スリープ防止機能をリクエストする関数
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {
          console.error("Wake Lock Error:", err);
        }
      }
    }

    // 音声をアンロックする関数（ボタンを押した瞬間に実行）
    function unlockAudio() {
      if (soundSuccess) {
        soundSuccess.play().then(() => {
          soundSuccess.pause();
          soundSuccess.currentTime = 0;
        }).catch(e => console.log("Audio unlock failed"));
      }
    }

    async function openScanner(mode) {
      currentMode = mode;
      isProcessing = false;
      
      // 1. UIのリセット
      overlayMsg.innerText = mode + "QRをスキャン中...";
      document.body.classList.remove('success-flash');
      
      // 2. 音声のアンロックとスリープ防止の起動（ユーザー操作時のみ可能）
      unlockAudio();
      requestWakeLock();

      document.getElementById('menu-view').style.display = 'none';
      document.getElementById('scan-view').style.display = 'flex';
      
      // 3. 30秒タイムアウト設定
      if (scanTimer) clearTimeout(scanTimer);
      scanTimer = setTimeout(() => {
        alert("30秒経過しましたので、選択画面に戻ります。");
        closeScanner();
      }, 30000);

      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
        });
        video.srcObject = videoStream;
        video.play();
        requestAnimationFrame(tick);
      } catch (err) {
        alert("カメラエラー: " + err);
        closeScanner();
      }
    }

    function closeScanner() {
      // タイマー停止
      if (scanTimer) clearTimeout(scanTimer);
      
      // スリープ防止解除
      if (wakeLock !== null) {
        wakeLock.release().then(() => { wakeLock = null; });
      }

      // カメラ停止
      if (videoStream) {
        videoStream.getTracks().forEach(track => track.stop());
        videoStream = null;
      }
      
      document.getElementById('menu-view').style.display = 'flex';
      document.getElementById('scan-view').style.display = 'none';
      document.body.classList.remove('success-flash');
      overlayMsg.innerText = "QRコードをスキャン";
    }

    function tick() {
      if (video.readyState === video.HAVE_ENOUGH_DATA && !isProcessing && document.getElementById('scan-view').style.display === 'flex') {
        const canvas = document.createElement('canvas');
        canvas.height = video.videoHeight; canvas.width = video.videoWidth;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
        
        // 数字4桁バリデーション
        if (code && /^\d{4}$/.test(code.data)) {
          isProcessing = true;
          if (scanTimer) clearTimeout(scanTimer); // スキャン成功でタイマー解除
          handleScan(code.data);
          return;
        }
      }
      if (!isProcessing && document.getElementById('scan-view').style.display === 'flex') {
        requestAnimationFrame(tick);
      }
    }

    async function handleScan(staffId) {
      overlayMsg.innerText = "送信中...";
      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ staffId: staffId, type: currentMode })
        });
        const res = await response.json();
        if (res.success) {
          // 音を鳴らす（すでにアンロック済み）
          if (soundSuccess) {
            soundSuccess.play().catch(e => console.log("Play failed"));
          }
          
          document.body.classList.add('success-flash');
          overlayMsg.innerHTML = `<span class="success-msg">${res.status}完了<br>ID:${res.staffId}</span>`;
          
          setTimeout(() => {
            closeScanner();
          }, 2000);
        } else {
          alert("エラー: " + res.message);
          isProcessing = false;
        }
      } catch (err) {
        alert("通信失敗: " + err);
        isProcessing = false;
        overlayMsg.innerText = currentMode + "QRをスキャン中...";
      }
    }
  </script>
</body>
</html>
